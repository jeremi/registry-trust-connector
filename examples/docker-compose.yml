services:
  rtc-openspp-client:
    image: ${CONNECTOR_IMAGE:-registry-trust-connector:dev}
    build: &connector-build
      context: ..
      dockerfile: Dockerfile
      additional_contexts:
        registry-platform: ../../registry-platform
    pull_policy: build
    init: true
    user: "65532:65532"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    working_dir: /work
    command:
      - client
      - --config
      - /work/examples/client.openspp.yaml
    ports:
      - "127.0.0.1:7080:7080"
    volumes:
      - .:/work/examples:ro
    depends_on:
      - rtc-relay-server
    networks:
      - trust-connector

  rtc-relay-server:
    image: ${CONNECTOR_IMAGE:-registry-trust-connector:dev}
    build: *connector-build
    pull_policy: build
    init: true
    user: "65532:65532"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    working_dir: /work
    command:
      - server
      - --config
      - /work/examples/server.relay.yaml
    ports:
      - "127.0.0.1:9443:9443"
    environment:
      REGISTRY_RELAY_BEARER_TOKEN: ${REGISTRY_RELAY_BEARER_TOKEN:-dev-replace-me}
      REGISTRY_RELAY_DCI_BEARER_TOKEN: ${REGISTRY_RELAY_DCI_BEARER_TOKEN:-dev-replace-me}
    volumes:
      - .:/work/examples:ro
    depends_on:
      - registry-relay
    networks:
      - trust-connector
      - relay-private

  registry-relay:
    image: ${REGISTRY_RELAY_MOCK_IMAGE:-python:3.12-alpine@sha256:236173eb74001afe2f60862de935b74fcbd00adfca247b2c27051a70a6a39a2d}
    init: true
    user: "65532:65532"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    working_dir: /work
    command:
      - python
      - /work/examples/relay/mock-relay.py
    expose:
      - "8080"
    environment:
      REGISTRY_RELAY_BIND: 0.0.0.0:8080
      PYTHONDONTWRITEBYTECODE: "1"
    tmpfs:
      - /tmp
    volumes:
      - .:/work/examples:ro
    networks:
      - relay-private

networks:
  trust-connector:
  relay-private:
    internal: true
