name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: registry-trust-connector
    steps:
      - uses: actions/checkout@v6
        with:
          path: registry-trust-connector
      - uses: actions/checkout@v6
        with:
          repository: jeremi/registry-platform
          ref: ${{ github.event_name == 'pull_request' && '184d83e204cc33d19c8ca42b9d14ed7dd3c1cd05' || 'main' }}
          path: registry-platform
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: registry-trust-connector
      - run: cargo fmt --all -- --check
      - run: cargo check --locked --all-targets
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo test --locked --all-targets
      - run: cargo build --locked

  example-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: registry-trust-connector
    steps:
      - uses: actions/checkout@v6
        with:
          path: registry-trust-connector
      - uses: actions/checkout@v6
        with:
          repository: jeremi/registry-platform
          ref: ${{ github.event_name == 'pull_request' && '184d83e204cc33d19c8ca42b9d14ed7dd3c1cd05' || 'main' }}
          path: registry-platform
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: registry-trust-connector
      - run: examples/generate-dev-pki.sh --force
      - run: cargo run --locked -- validate --config examples/client.openspp.yaml --mode client
      - run: |
          REGISTRY_RELAY_BEARER_TOKEN=dev-replace-me \
          REGISTRY_RELAY_DCI_BEARER_TOKEN=dev-replace-me \
            cargo run --locked -- validate --config examples/server.relay.yaml --mode server --require-env

  dependency-policy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: registry-trust-connector
    steps:
      - uses: actions/checkout@v6
        with:
          path: registry-trust-connector
      - uses: actions/checkout@v6
        with:
          repository: jeremi/registry-platform
          ref: ${{ github.event_name == 'pull_request' && '184d83e204cc33d19c8ca42b9d14ed7dd3c1cd05' || 'main' }}
          path: registry-platform
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: registry-trust-connector
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.7
      - run: cargo deny check
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit --db "$RUNNER_TEMP/cargo-audit-db" --deny warnings --ignore RUSTSEC-2025-0134

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Gitleaks
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: Scan tracked files for secrets
        env:
          GITLEAKS_CONFIG_TOML: |
            [extend]
            useDefault = true

            [[allowlists]]
            description = "Ignore generated Rust build output."
            paths = ["(^|/)target/"]
        run: |
          "$RUNNER_TEMP/bin/gitleaks" dir --no-banner --redact --verbose --timeout 120 .

  docker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: registry-trust-connector
    steps:
      - uses: actions/checkout@v6
        with:
          path: registry-trust-connector
      - uses: actions/checkout@v6
        with:
          repository: jeremi/registry-platform
          ref: ${{ github.event_name == 'pull_request' && '184d83e204cc33d19c8ca42b9d14ed7dd3c1cd05' || 'main' }}
          path: registry-platform
      - uses: docker/setup-buildx-action@v3
      - run: cp examples/.env.example examples/.env
      - run: docker compose --env-file examples/.env -f examples/docker-compose.yml config
      - run: docker compose --env-file examples/.env -f examples/docker-compose.yml build
      - run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.67.2 image \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            registry-trust-connector:dev
